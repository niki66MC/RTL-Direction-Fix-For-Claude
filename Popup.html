<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      width: 220px;
      background: #1c1917;
      color: #e8e8e0;
      font-family: sans-serif;
      padding: 16px;
    }
 
    .header {
      display: flex;
      align-items: center;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
 
    .header-text {
      flex: 1;
      text-align: center;
    }
 
    .logo { width: 30px; height: 30px; flex-shrink: 0; }
 
    .title { font-size: 13px; font-weight: 700; }
    .subtitle { font-size: 11px; color: #78716c; margin-top: 2px; }
 
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
 
    .label { font-size: 13px; font-weight: 600; color: #d6d3d1; }
 
    .switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
 
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #3d3835;
      border-radius: 24px;
      transition: background 0.25s;
    }
 
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #78716c;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }
 
    input:checked + .slider { background: #cc785c; }
    input:checked + .slider::before { transform: translateX(18px); background: #fff; }
 

  </style>
</head>
<body>
  <div class="header">
    <img class="logo" src="icon-48.svg" alt="icon"/>
    <div class="header-text">
      <div class="title">Claude RTL Fix</div>
      <div class="subtitle">Hebrew text direction</div>
    </div>
  </div>
 
  <div class="row">
    <span class="label">RTL</span>
    <label class="switch">
      <input type="checkbox" id="rtlToggle"/>
      <span class="slider"></span>
    </label>
  </div>
 
  <script src="popup.js"></script>
</body>
</html>
